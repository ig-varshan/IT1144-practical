<!-- TITLE -->
<h1 style="text-align:center; margin-top:40px; color:#670047;">
    Contact Us ☎️
</h1>

<!-- UNIVERSITY CONTACT DETAILS -->
<div class="contact-info">
    <strong>📍 Address:</strong> Pampaimadu, Vavuniya, Sri Lanka

    <span>|</span>

    <strong>📞 Phone:</strong> +94 24 222 2265

    <span>|</span>

    <strong>📧 Email:</strong> registraroffice@vau.ac.lk
</div>
<!-- CONTACT FORM -->
<div class="form-box">

    <input type="text" id="contactName" placeholder="Your Name" required>

    <input type="tel" id="contactPhone" placeholder="Contact Number (07xxxxxxxx)" required>

    <input type="email" id="contactEmail" placeholder="Email" required>

    <textarea id="contactMessage" placeholder="Your Message..." rows="5" required></textarea>

    <button type="button" onclick="sendMessage()">
        Send Message
    </button>

</div>
