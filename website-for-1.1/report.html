<!DOCTYPE html>
<html>
<head>
    <title>Report Lost Item</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <div class="logo-title">
        <img src="logo.png" alt="Logo" class="logo">
        <h2>Lost & Found | University of Vavuniya</h2>
    </div>

    <div>
        <a href="index.html">Home</a>
        <a href="report.html">Report Lost</a>
        <a href="found.html">Found Items</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<h1 style="text-align:center; margin-top:30px;">
    Report Lost Item 🔖
</h1>

<div class="form-box">

    <input
        type="text"
        id="itemName"
        placeholder="Item Name"
        required>
    <br><br>

    <input
        type="text"
        id="locationLost"
        placeholder="Location Lost"
        required>
    <br><br>

    <input
        type="tel"
        id="contactPhone"
        placeholder="Contact Number"
        required>
    <br><br>

    <input
        type="date"
        id="dateLost">
    <br><br>

    <textarea
        id="description"
        placeholder="Description"
        rows="5"></textarea>
    <br><br>

    <button onclick="saveItem()">Submit</button>

</div>

<footer><p>Lost & Found System &copy 2026 University of Vavuniya, Sri Lanka. All rights reserved.</p></footer>
<script src="script.js"></script>

</body>
</html>
