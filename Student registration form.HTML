<!DOCTYPE HTML>
<HTML LANG="eng">
<head>
	<TITLE>Student Registration Form</title>
	<style>
		body{
			font-family: sans-serif;
			background-color: #f0f4f8;
			padding:40px;
			margin:0;
			
			}
			
			h1{
			color:#1a202c;
			font-size: 1.6rem;
			margin-bottom: 24px;
			}
			</style>
			</head>
		<body>
		<h2>Student Registration Form</h2>
		<form>
		<label>Full Name</label><br>
		<input type="text"placeholder="Your Name"> </input>
		<br><br>
		
		
		<label>Email</label><br>
		<input type="email" placeholder="Email address"> </input>
		<br><br>
		
		<label>Password</label><br>
		<input type="password" placeholder="Enter Password ">  </input>
		<br><br>
		
		
		<label>Age</label><br>
		<input type="number" placeholder="Enter age"> </input>
		<br><br>
		
		<label>Phone Number</label><br>
		<input type="tel" placeholder="Mobile No">  </input>
		<br><br>
		
		<label>Gender</label><br><BR>
		<input type="radio" name="gender"></input>Male<BR>
		<input type="radio" name="gender"></input>Female<BR>
		<input type="radio" name="gender"></input>Prefer not to say<BR>
		<br>
		
		<p>
		Skills</p>
		<label>
		<input type="checkbox" name="skills">  </input>
		HTML
		</label>
		<BR>
		
		
		<label>
		<input type="checkbox" name="skills">  </input>
		JAVA
		</label>
		<BR>
		
		
		<label>
		<input type="checkbox" name="skills">  </input>
		PYTHON
		</label>
		<BR>
		
		
		<label>
		<input type="checkbox" name="skills">  </input>
		C++
		</label>
		<br><br>
		
		<label>Year of Study</label><br>
		<select name="year">
		    <option>--Select year--</option>
			<option>First year</option>
		    <option>Second year</option>
			<option>Third year</option>
			<option>Fourth year</option>
			</select>
		<br><br>
		<label>About you</label><br>
		<textarea rows="4" placeholder="Tell us a bit about you..."></textarea>
		<br><br>
		
		<button type="submit"> Register Now</button>
	 
		</form>
		</body>
	    </html>
